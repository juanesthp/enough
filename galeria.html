<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Galería · Enough</title>
  <link rel="icon" type="image/svg+xml" href="./favicon.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Galería de Enough: una selección fotográfica de espacios, atmósferas y materia desde una mirada curatorial.">
  <link rel="canonical" href="https://juanesthp.github.io/enough/galeria.html">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Raleway:wght@200;300;400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #06070a;
      --panel: rgba(255,255,255,.03);
      --text: #f4ede3;
      --muted: rgba(244,237,227,.62);
      --faint: rgba(244,237,227,.3);
      --line: rgba(244,237,227,.1);
      --gold: #b69a6a;
      --shadow-soft: 0 18px 40px rgba(0,0,0,.24);
      --shadow-deep: 0 36px 80px rgba(0,0,0,.45);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { background: var(--bg); scroll-padding-top: 8rem; }
    body {
      background:
        radial-gradient(circle at top left, rgba(182,154,106,.1), transparent 24%),
        linear-gradient(180deg, #0f1114 0%, #08090c 46%, #050608 100%);
      font-family: Raleway, sans-serif;
      padding: 40px;
      max-width: 880px;
      margin: 0 auto;
      overflow-x: hidden;
      color: var(--text);
    }

    * { cursor: none; }
    .cursor { position: fixed; pointer-events: none; z-index: 9999; transition: transform .15s ease; top: 0; left: 0; mix-blend-mode: difference; }

    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.5rem 4rem;
      background: rgba(6,7,10,.94);
      backdrop-filter: blur(14px);
    }
    nav a {
      text-decoration: none;
      color: var(--text);
      font-size: 12px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      border-bottom: none;
      transition: opacity .2s;
    }
    nav a:hover { opacity: .55; }
    nav a[aria-current="page"] { border-bottom: 1px solid rgba(244,237,227,.35); padding-bottom: 2px; }
    .logo { font-size: 14px; letter-spacing: 6px; font-weight: 200; text-transform: uppercase; border-bottom: none; margin-right: 40px; }

    .galeria-header { margin-top: 8rem; margin-bottom: 3rem; text-align: center; }
    .section-label { font-size: 11px; letter-spacing: .2em; text-transform: uppercase; color: var(--gold); margin-bottom: 1rem; display: block; }
    h1 { font-family: 'Cormorant Garamond', serif; font-size: 3rem; font-weight: 300; letter-spacing: 8px; text-transform: uppercase; color: var(--text); }

    .grid { columns: 2; column-gap: 2rem; margin-top: 2rem; }
    .foto {
      break-inside: avoid;
      margin-bottom: 2rem;
      background: var(--panel);
      border: 1px solid var(--line);
      box-shadow: var(--shadow-soft);
      transition: transform .25s ease, border-color .25s ease;
    }
    .foto:hover { transform: translateY(-2px); border-color: rgba(199,167,114,.26); }
    .foto-wrap { overflow: hidden; }
    .foto img { width: 100%; height: auto; object-fit: contain; display: block; transition: transform .6s ease; }
    .foto:hover img { transform: scale(1.03); }
    .foto-desc { padding: 1rem 1rem 1.2rem; border-top: 1px solid var(--line); }
    .foto-desc h3 { font-size: 13px; font-weight: 400; letter-spacing: 2px; text-transform: uppercase; color: var(--text); margin-bottom: 6px; }
    .foto-desc p { font-size: 13px; color: var(--muted); line-height: 1.8; }

    .lb-overlay {
      position: fixed; inset: 0; z-index: 999;
      background: rgba(4,5,7,.97);
      display: flex; align-items: stretch;
      opacity: 0; pointer-events: none;
      transition: opacity .35s ease;
    }
    .lb-overlay.open { opacity: 1; pointer-events: all; }
    .lb-media { flex: 2; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; }
    .lb-media img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .lb-prev, .lb-next {
      position: absolute; top: 50%; transform: translateY(-50%);
      background: none; border: none; color: rgba(244,237,227,.3);
      font-size: 28px; font-family: Raleway, sans-serif; font-weight: 200;
      padding: 1rem; transition: color .2s; z-index: 2;
    }
    .lb-prev { left: 1rem; }
    .lb-next { right: 1rem; }
    .lb-prev:hover, .lb-next:hover { color: var(--text); }
    .lb-info {
      flex: 1; min-width: 300px; max-width: 380px;
      padding: 4rem 3rem; display: flex; flex-direction: column;
      border-left: 1px solid rgba(244,237,227,.06);
      overflow-y: auto; background: rgba(255,255,255,.018);
    }
    .lb-label { font-size: 10px; letter-spacing: .2em; text-transform: uppercase; color: var(--gold); margin-bottom: 2rem; display: block; }
    .lb-title { font-family: 'Cormorant Garamond', serif; font-size: 2rem; font-weight: 300; letter-spacing: 4px; text-transform: uppercase; color: var(--text); margin-bottom: 2rem; line-height: 1.2; }
    .lb-desc { font-size: 14px; color: var(--muted); line-height: 2; flex: 1; overflow-y: auto; padding-right: .5rem; }
    .lb-counter { margin-top: 2rem; font-size: 11px; letter-spacing: .15em; color: rgba(244,237,227,.2); flex-shrink: 0; }
    .lb-close {
      position: fixed; top: 1.5rem; right: 2rem;
      background: none; border: none; color: rgba(244,237,227,.4);
      font-size: 28px; transition: color .2s; font-weight: 200;
      line-height: 1; font-family: Raleway, sans-serif; z-index: 1001;
    }
    .lb-close:hover { color: var(--text); }

    footer {
      border-top: 1px solid rgba(244,237,227,.06);
      color: var(--faint);
      display: flex; justify-content: space-between; align-items: center;
      padding: 2rem 4rem; font-size: 12px;
      width: 100vw; margin-left: calc(-50vw + 50%);
      margin-top: 4rem; letter-spacing: 2px;
      background: #050608;
    }
    footer .logo { font-size: 14px; letter-spacing: 6px; font-weight: 200; text-transform: uppercase; color: var(--faint); }

    @media (max-width: 920px) {
      body { padding: 28px; }
      nav {
        position: sticky;
        top: 0;
        flex-wrap: nowrap;
        justify-content: flex-start;
        gap: .9rem;
        padding: .95rem 1.2rem;
        background: linear-gradient(to bottom, rgba(9,9,15,.96) 0%, rgba(9,9,15,.82) 56%, rgba(9,9,15,0) 100%);
        backdrop-filter: none;
        overflow-x: auto;
        overflow-y: hidden;
        white-space: nowrap;
        -webkit-overflow-scrolling: touch;
        scrollbar-width: none;
        box-shadow: none;
      }
      nav::-webkit-scrollbar { display: none; }
      nav a { font-size: 10px; letter-spacing: 0.08em; }
      nav a { flex: 0 0 auto; position: relative; z-index: 1; }
      .logo { flex: 0 0 auto; margin-right: .85rem; text-align: left; }
      .galeria-header { margin-top: 4rem; margin-bottom: 2rem; }
      .grid { column-gap: 1.25rem; }
      .lb-overlay { flex-direction: column; overflow-y: auto; }
      .lb-media { flex: none; min-height: 54vh; }
      .lb-info {
        min-width: unset;
        max-width: unset;
        padding: 2rem;
        border-left: none;
        border-top: 1px solid rgba(244,237,227,.06);
      }
      .lb-close { top: 1rem; right: 1rem; }
      footer {
        width: auto;
        margin-left: -28px;
        margin-right: -28px;
        flex-direction: column;
        gap: 1rem;
        text-align: center;
        padding: 2rem;
      }
      .cursor { display: none; }
      * { cursor: auto; }
    }

    @media (max-width: 640px) {
      body { padding: 20px; }
      nav { gap: .8rem; padding: .9rem 1rem; }
      nav a { font-size: 9px; }
      .grid { columns: 1; }
      .lb-media { min-height: 46vh; }
      .lb-info { padding: 1.75rem 1.25rem; }
      .lb-title { font-size: 1.4rem; }
      footer {
        margin-left: -20px;
        margin-right: -20px;
      }
    }
  </style>
</head>
<body>

  <svg class="cursor" id="cursor" width="26" height="26" viewBox="0 0 26 26" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
    <line x1="13" y1="3" x2="13" y2="23" stroke="#ffffff" stroke-width="1.6"/>
    <line x1="3" y1="13" x2="23" y2="13" stroke="#ffffff" stroke-width="1.6"/>
  </svg>

  <nav>
    <a href="index.html" class="logo">Enough</a>
    <a href="index.html#filosofia">Filosofía</a>
    <a href="galeria.html" aria-current="page">Galería</a>
    <a href="blog.html">Blog</a>
    <a href="fragmentos.html">Fragmentos</a>
    <a href="sobre.html">Sobre mí</a>
    <a href="index.html#servicios">Servicios</a>
    <a href="index.html#contacto">Contacto</a>
  </nav>

  <main>
    <div class="galeria-header">
      <span class="section-label">Fotografía</span>
      <h1>Galería</h1>
    </div>
    <div class="grid" id="galeria-grid"></div>
  </main>

  <div class="lb-overlay" id="lightbox" role="dialog" aria-modal="true" aria-label="Visor de imágenes de la galería">
    <button class="lb-close" id="lb-close" aria-label="Cerrar galería">×</button>
    <div class="lb-media">
      <img id="lb-img" src="" alt="">
      <button class="lb-prev" id="lb-prev" aria-label="Imagen anterior">←</button>
      <button class="lb-next" id="lb-next" aria-label="Siguiente imagen">→</button>
    </div>
    <div class="lb-info">
      <span class="lb-label">Enough · Fotografía</span>
      <h2 class="lb-title" id="lb-title"></h2>
      <div class="lb-desc" id="lb-desc"></div>
      <p class="lb-counter" id="lb-counter"></p>
    </div>
  </div>

  <footer>
    <span class="logo">Enough</span>
    <span>© 2026 Enough. Diseño con intención.</span>
    <span>Bucaramanga, Colombia</span>
  </footer>

  <script>
    const galeriaGrid = document.getElementById('galeria-grid');

    const items = [
      { src: './proyecto3.jpg',  alt: 'Fragmento arquitectónico 1',  title: 'Trama',       desc: 'Texturas, sombras y superficies que hablan antes de cualquier discurso.' },
      { src: './proyecto4.jpg',  alt: 'Fragmento arquitectónico 2',  title: 'Presencia',   desc: 'Un estudio visual sobre escala, densidad y tiempo.' },
      { src: './proyecto5.jpg',  alt: 'Fragmento arquitectónico 3',  title: 'Reposo',      desc: 'La calma como cualidad espacial y no solo como estilo.' },
      { src: './proyecto6.jpg',  alt: 'Fragmento arquitectónico 4',  title: 'Materia',     desc: 'Observación de acabados, tactilidad y peso visual.' },
      { src: './proyecto7.jpg',  alt: 'Fragmento arquitectónico 5',  title: 'Umbral',      desc: 'El borde entre entrar y permanecer también diseña experiencia.' },
      { src: './proyecto8.jpg',  alt: 'Fragmento arquitectónico 6',  title: 'Vacío',       desc: 'Lo que no se llena puede ser también una decisión de carácter.' },
      { src: './proyecto9.jpg',  alt: 'Fragmento arquitectónico 7',  title: 'Ritmo',       desc: 'Una secuencia visual donde la repetición construye atmósfera.' },
      { src: './proyecto10.jpg', alt: 'Fragmento arquitectónico 8',  title: 'Calma',       desc: 'Luz contenida, composición sobria y una presencia silenciosa.' },
      { src: './proyecto11.jpg', alt: 'Fragmento arquitectónico 9',  title: 'Tensión',     desc: 'Contrastes leves para producir una emoción más profunda que lo obvio.' },
      { src: './proyecto12.jpg', alt: 'Fragmento arquitectónico 10', title: 'Silencio',    desc: 'Espacios que no necesitan exceso para sentirse completos.' },
      { src: './proyecto14.jpg', alt: 'Fragmento arquitectónico 11', title: 'Huella',      desc: 'Rastros de uso, desgaste y memoria como parte del lenguaje espacial.' },
      { src: './proyecto15.jpg', alt: 'Fragmento arquitectónico 12', title: 'Densidad',    desc: 'Capas de materia y sombra que agregan espesor emocional.' },
      { src: './proyecto16.jpg', alt: 'Fragmento arquitectónico 13', title: 'Temperatura', desc: 'El color del ambiente también construye una forma de habitar.' },
      { src: './proyecto22.jpg', alt: 'Fragmento arquitectónico 14', title: 'Luz',         desc: 'Una observación sobre cómo la luz ordena y da sentido al espacio.' },
      { src: './proyecto23.jpg', alt: 'Fragmento arquitectónico 15', title: 'Archivo',     desc: 'Cada imagen funciona como una pieza de un archivo en formación.' }
    ];

    galeriaGrid.innerHTML = items.map((item, index) => `
      <button class="foto" type="button" data-index="${index}">
        <div class="foto-wrap"><img src="${item.src}" alt="${item.alt}" loading="lazy" decoding="async"></div>
        <div class="foto-desc"><h3>${item.title}</h3><p>${item.desc}</p></div>
      </button>
    `).join('');

    const fotos = Array.from(document.querySelectorAll('.foto'));
    const lightbox = document.getElementById('lightbox');
    const lbImg    = document.getElementById('lb-img');
    const lbTitle  = document.getElementById('lb-title');
    const lbDesc   = document.getElementById('lb-desc');
    const lbCounter= document.getElementById('lb-counter');
    const lbClose  = document.getElementById('lb-close');
    const lbPrev   = document.getElementById('lb-prev');
    const lbNext   = document.getElementById('lb-next');
    let currentIndex = 0;

    function renderLightbox(index) {
      const item = items[index];
      if (!item) return;
      currentIndex = index;
      lbImg.src = item.src;
      lbImg.alt = item.alt;
      lbTitle.textContent = item.title;
      lbDesc.textContent = item.desc;
      lbCounter.textContent = `${index + 1} / ${items.length}`;
    }
    function openLightbox(index) {
      renderLightbox(index);
      lightbox.classList.add('open');
      document.body.style.overflow = 'hidden';
    }
    function closeLightbox() {
      lightbox.classList.remove('open');
      document.body.style.overflow = '';
    }
    function stepLightbox(direction) {
      currentIndex = (currentIndex + direction + items.length) % items.length;
      renderLightbox(currentIndex);
    }

    fotos.forEach(foto => { foto.addEventListener('click', () => openLightbox(Number(foto.dataset.index))); });
    lbClose.addEventListener('click', closeLightbox);
    lbPrev.addEventListener('click', () => stepLightbox(-1));
    lbNext.addEventListener('click', () => stepLightbox(1));
    lightbox.addEventListener('click', e => { if (e.target === lightbox) closeLightbox(); });
    document.addEventListener('keydown', e => {
      if (!lightbox.classList.contains('open')) return;
      if (e.key === 'Escape') closeLightbox();
      if (e.key === 'ArrowLeft') stepLightbox(-1);
      if (e.key === 'ArrowRight') stepLightbox(1);
    });

    const cursor = document.getElementById('cursor');
    document.addEventListener('mousemove', e => {
      cursor.style.left = e.clientX + 'px';
      cursor.style.top  = e.clientY + 'px';
    });
    document.querySelectorAll('a, button').forEach(el => {
      el.addEventListener('mouseenter', () => { cursor.style.transform = 'scale(1.4)'; });
      el.addEventListener('mouseleave', () => { cursor.style.transform = 'scale(1)'; });
    });
  </script>

</body>
</html>
