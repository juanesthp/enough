<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fragmentos — Enough</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=Raleway:wght@200;300;400&display=swap" rel="stylesheet">

    <style>
        :root {
            --cream: #09090f;
            --dark: #f4ede3;
            --gold: #c7a772;
            --dark-soft: rgba(244, 237, 227, 0.68);
            --dark-faint: rgba(244, 237, 227, 0.2);
            --hairline: rgba(244, 237, 227, 0.12);
            --panel: rgba(19, 19, 28, 0.78);
            --shadow-soft: 0 24px 60px rgba(0, 0, 0, 0.28);
            --shadow-deep: 0 40px 100px rgba(0, 0, 0, 0.48);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-padding-top: 8rem; }

        html, body {
            background-color: var(--cream);
            color: var(--dark);
            font-family: 'Raleway', sans-serif;
            font-weight: 300;
            cursor: none;
            min-height: 100vh;
            overflow-x: hidden;
        }

        body {
            background:
                radial-gradient(circle at 20% 18%, rgba(199, 167, 114, 0.12), transparent 24%),
                radial-gradient(circle at 82% 28%, rgba(88, 88, 124, 0.2), transparent 28%),
                radial-gradient(circle at 50% 100%, rgba(199, 167, 114, 0.08), transparent 32%),
                linear-gradient(180deg, #0b0b12 0%, #09090f 45%, #06060a 100%);
        }

        body::before, body::after {
            content: '';
            position: fixed;
            pointer-events: none;
            z-index: 0;
            filter: blur(70px);
            opacity: 0.65;
        }
        body::before { top: 10vh; left: -80px; width: 240px; height: 240px; background: rgba(199, 167, 114, 0.08); }
        body::after  { right: -80px; bottom: 10vh; width: 280px; height: 280px; background: rgba(92, 92, 150, 0.14); }

        .cursor {
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            transition: transform .15s ease;
            top: 0; left: 0;
            mix-blend-mode: difference;
        }

        @media (max-width: 768px) {
            .cursor { display: none; }
            html, body { cursor: auto; }
        }

        /* ── NAV — mismo patrón que todas las otras páginas ── */
        nav {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 4rem;
            background: rgba(9, 9, 15, 0.94);
            backdrop-filter: blur(14px);
        }
        nav a {
            text-decoration: none;
            color: var(--dark);
            font-size: 12px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            border-bottom: none;
            transition: opacity .2s;
        }
        nav a:hover { opacity: .55; }
        nav a[aria-current="page"] { border-bottom: 1px solid rgba(244, 237, 227, .35); padding-bottom: 2px; }
        .logo { font-size: 14px; letter-spacing: 6px; font-weight: 200; text-transform: uppercase; border-bottom: none; margin-right: 40px; }

        @media (max-width: 920px) {
            nav {
                position: sticky;
                top: 0;
                flex-wrap: nowrap;
                justify-content: flex-start;
                gap: .9rem;
                padding: .95rem 1.2rem;
                background: linear-gradient(to bottom, rgba(9,9,15,.96) 0%, rgba(9,9,15,.82) 56%, rgba(9,9,15,0) 100%);
                backdrop-filter: none;
                overflow-x: auto;
                overflow-y: hidden;
                white-space: nowrap;
                -webkit-overflow-scrolling: touch;
                scrollbar-width: none;
                box-shadow: none;
            }
            nav::-webkit-scrollbar { display: none; }
            nav a { font-size: 0.65rem; letter-spacing: 0.10em; }
            nav a { flex: 0 0 auto; position: relative; z-index: 1; }
            .logo { flex: 0 0 auto; margin-right: .85rem; text-align: left; }
            .index-view,
            .detail-view { padding-top: 8rem; }
            .index-header {
                margin-bottom: 4.5rem;
                padding: 2.5rem 2rem;
            }
            .index-rule { margin-bottom: 3.5rem; }
            .fragmento-item { padding: 2.4rem 1.8rem; }
            .detail-container { padding: 2.75rem 2rem; }
        }

        @media (max-width: 640px) {
            nav { gap: .8rem; padding: .9rem 1rem; }
            nav a { font-size: 0.58rem; letter-spacing: 0.08em; }
            .index-view,
            .detail-view { padding: 7rem 1rem 4rem; }
            .index-header,
            .detail-container { padding: 2rem 1.25rem; }
            .fragmento-item { padding: 2rem 1.2rem; }
        }

        /* ── INDEX VIEW ── */
        .index-view {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            padding: 12rem 2rem 8rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            opacity: 0;
            animation: fadeIn 1.6s ease forwards;
        }
        .index-view.hidden { display: none; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .index-header {
            text-align: center;
            margin-bottom: 8rem;
            max-width: 580px;
            padding: 3rem 2.75rem;
            border: 1px solid var(--hairline);
            background: linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.015));
            box-shadow: var(--shadow-soft);
            backdrop-filter: blur(12px);
        }
        .index-title {
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-weight: 300;
            font-size: clamp(2.5rem, 6vw, 4.5rem);
            letter-spacing: 0.02em;
            margin-bottom: 2rem;
            line-height: 1;
            text-shadow: 0 18px 36px rgba(0,0,0,.34);
        }
        .index-epigraph {
            font-family: 'Cormorant Garamond', serif;
            font-weight: 300;
            font-size: 1.05rem;
            font-style: italic;
            color: var(--dark-soft);
            letter-spacing: 0.03em;
            line-height: 1.7;
        }
        .index-rule {
            width: 1px;
            height: 80px;
            background-color: var(--hairline);
            margin: 0 auto 6rem;
            box-shadow: 0 0 22px rgba(199, 167, 114, 0.18);
        }

        .fragmentos-list {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 720px;
            list-style: none;
        }
        .fragmento-item {
            width: 100%;
            padding: 3rem 2.5rem;
            border: 1px solid var(--hairline);
            background: linear-gradient(180deg, rgba(255,255,255,.025), rgba(255,255,255,.01));
            text-align: center;
            position: relative;
            box-shadow: var(--shadow-soft);
            transition: transform .45s ease, box-shadow .45s ease, border-color .45s ease;
        }
        .fragmento-item + .fragmento-item { margin-top: 1.2rem; }
        .fragmento-link { text-decoration: none; color: var(--dark); display: block; }
        .fragmento-item:hover {
            transform: translateY(-4px);
            border-color: rgba(199, 167, 114, 0.28);
            box-shadow: var(--shadow-deep);
        }
        .fragmento-numero {
            font-family: 'Raleway', sans-serif;
            font-size: 0.7rem;
            font-weight: 300;
            letter-spacing: 0.4em;
            color: var(--dark-soft);
            text-transform: uppercase;
            margin-bottom: 1.5rem;
            display: block;
        }
        .fragmento-ancla {
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-weight: 300;
            font-size: clamp(2rem, 4vw, 3rem);
            letter-spacing: 0.01em;
            line-height: 1.1;
            transition: color .5s ease, letter-spacing .5s ease;
            text-transform: uppercase;
        }
        .fragmento-link:hover .fragmento-ancla {
            color: var(--gold);
            letter-spacing: 0.04em;
            text-shadow: 0 10px 28px rgba(0,0,0,.32);
        }
        .empty-state {
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            color: var(--dark-soft);
            font-size: 1.1rem;
            width: 100%;
            padding: 4rem 2rem;
            text-align: center;
            border: 1px solid var(--hairline);
            background: var(--panel);
            box-shadow: var(--shadow-soft);
        }

        /* ── DETAIL VIEW ── */
        .detail-view {
            display: none;
            min-height: 100vh;
            padding: 12rem 2rem 6rem;
            flex-direction: column;
            align-items: center;
            opacity: 0;
            position: relative;
            z-index: 1;
        }
        .detail-view.active {
            display: flex;
            animation: fadeIn 1s ease forwards;
        }
        .detail-container {
            max-width: 620px;
            width: 100%;
            text-align: center;
            padding: 3.5rem 3rem;
            border: 1px solid var(--hairline);
            background: linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.015));
            box-shadow: var(--shadow-deep);
            backdrop-filter: blur(14px);
        }
        .detail-numero {
            font-family: 'Raleway', sans-serif;
            font-size: 0.7rem;
            font-weight: 300;
            letter-spacing: 0.4em;
            color: var(--dark-soft);
            text-transform: uppercase;
            margin-bottom: 2rem;
        }
        .detail-ancla {
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-weight: 300;
            font-size: clamp(2.5rem, 5vw, 3.5rem);
            line-height: 1;
            letter-spacing: 0.01em;
            margin-bottom: 4rem;
            text-shadow: 0 18px 40px rgba(0,0,0,.34);
            text-transform: uppercase;
        }
        .detail-rule {
            width: 60px;
            height: 1px;
            background-color: var(--gold);
            margin: 0 auto 4rem;
        }
        .detail-texto {
            font-family: 'Cormorant Garamond', serif;
            font-weight: 300;
            font-size: clamp(1.15rem, 1.6vw, 1.35rem);
            line-height: 1.9;
            letter-spacing: 0.015em;
            text-align: left;
            color: rgba(244, 237, 227, 0.92);
        }
        .detail-texto p { margin-bottom: 1.5rem; }
        .detail-texto p:last-child { margin-bottom: 0; }
        .detail-back {
            display: inline-block;
            margin-top: 6rem;
            text-decoration: none;
            color: var(--dark-soft);
            font-size: 0.7rem;
            font-weight: 300;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            padding-bottom: 4px;
            border-bottom: 1px solid transparent;
            transition: color .4s ease, border-color .4s ease, letter-spacing .4s ease;
        }
        .detail-back:hover { color: var(--gold); border-color: var(--gold); letter-spacing: 0.35em; }

        .footer-mark {
            text-align: center;
            font-family: 'Raleway', sans-serif;
            font-size: 14px;
            font-weight: 200;
            color: var(--dark-faint);
            letter-spacing: 6px;
            text-transform: uppercase;
            padding: 4rem 0 2rem;
        }
    </style>
</head>
<body>

    <svg class="cursor" id="cursor" width="26" height="26" viewBox="0 0 26 26" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <line x1="13" y1="3" x2="13" y2="23" stroke="#f4ede3" stroke-width="1.6"/>
        <line x1="3" y1="13" x2="23" y2="13" stroke="#f4ede3" stroke-width="1.6"/>
    </svg>

    <nav>
        <a href="index.html" class="logo">Enough</a>
        <a href="index.html#filosofia">Filosofía</a>
        <a href="galeria.html">Galería</a>
        <a href="blog.html">Blog</a>
        <a href="fragmentos.html" aria-current="page">Fragmentos</a>
        <a href="sobre.html">Sobre mí</a>
        <a href="index.html#servicios">Servicios</a>
        <a href="index.html#contacto">Contacto</a>
    </nav>

    <main class="index-view" id="indexView">
        <header class="index-header">
            <h1 class="index-title">Fragmentos</h1>
            <p class="index-epigraph">Un cuaderno. Notas sobre atmósferas, ausencias y umbrales.</p>
        </header>
        <div class="index-rule"></div>
        <ul class="fragmentos-list" id="fragmentosList"></ul>
        <div class="footer-mark">Enough</div>
    </main>

    <main class="detail-view" id="detailView">
        <article class="detail-container">
            <div class="detail-numero" id="detailNumero"></div>
            <h1 class="detail-ancla" id="detailAncla"></h1>
            <div class="detail-rule"></div>
            <div class="detail-texto" id="detailTexto"></div>
            <a href="#" class="detail-back" id="detailBack">— Regresar</a>
        </article>
    </main>

    <script>
        const fragmentos = [
            {
                numero: "I",
                ancla: "Ausencia",
                texto: `Hay espacios que no se habitan con el cuerpo, sino con la falta de él. Un lugar diseñado para alguien que ya no está es, en realidad, un monumento al aire que quedó atrapado entre cuatro paredes.`
            },
            {
                numero: "II",
                ancla: "Sombra",
                texto: `La luz nos muestra lo que somos, pero es la sombra la que nos da profundidad. Un cuarto sin rincones oscuros es un espacio sin secretos; una superficie plana donde el alma no tiene dónde esconderse.`
            },
            {
                numero: "III",
                ancla: "Umbral",
                texto: `El umbral es un espacio de transición, un lugar que no es ni aquí ni allá. Es el aire que se respira justo antes de entrar a una habitación, la pausa entre el mundo exterior y el interior. Un buen umbral prepara el cuerpo para lo que viene, como un suspiro que anuncia un cambio de escena.`
            },
            {
                numero: "IV",
                ancla: "Atmósfera",
                texto: `La atmósfera de un espacio es su esencia intangible. No se puede tocar, pero se siente en cada rincón. Es la suma de la luz, el sonido, el olor y la temperatura; el eco de las personas que lo habitan y las historias que han dejado en sus paredes.`
            }
        ];

        const fragmentosList = document.getElementById('fragmentosList');
        const indexView      = document.getElementById('indexView');
        const detailView     = document.getElementById('detailView');
        const detailNumero   = document.getElementById('detailNumero');
        const detailAncla    = document.getElementById('detailAncla');
        const detailTexto    = document.getElementById('detailTexto');
        const detailBack     = document.getElementById('detailBack');

        function slugify(text) {
            return text.toLowerCase()
                .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
                .replace(/[^a-z0-9]+/g, '-')
                .replace(/^-+|-+$/g, '');
        }

        function renderIndex() {
            if (fragmentos.length === 0) {
                fragmentosList.innerHTML = '<li class="empty-state">Aún sin fragmentos.</li>';
                return;
            }
            fragmentosList.innerHTML = fragmentos.map((f, i) => `
                <li class="fragmento-item">
                    <a href="#${slugify(f.ancla)}" class="fragmento-link" data-index="${i}">
                        <span class="fragmento-numero">Fragmento ${f.numero}</span>
                        <span class="fragmento-ancla">${f.ancla}</span>
                    </a>
                </li>
            `).join('');

            document.querySelectorAll('.fragmento-link').forEach(link => {
                link.addEventListener('click', (e) => {
                    e.preventDefault();
                    const idx = parseInt(link.dataset.index);
                    showDetail(idx);
                    history.pushState({ view: 'detail', index: idx }, '', `#${slugify(fragmentos[idx].ancla)}`);
                });
            });
        }

        function showDetail(index) {
            const f = fragmentos[index];
            if (!f) return;
            detailNumero.textContent = `Fragmento ${f.numero}`;
            detailAncla.textContent  = f.ancla;
            detailTexto.innerHTML    = f.texto
                .split('\n\n')
                .map(p => `<p>${p.trim().replace(/\n/g, '<br>')}</p>`)
                .join('');
            indexView.classList.add('hidden');
            detailView.classList.add('active');
            window.scrollTo({ top: 0, behavior: 'instant' });
        }

        function showIndex() {
            detailView.classList.remove('active');
            indexView.classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'instant' });
        }

        detailBack.addEventListener('click', (e) => {
            e.preventDefault();
            showIndex();
            history.pushState({ view: 'index' }, '', window.location.pathname);
        });

        window.addEventListener('popstate', () => {
            const hash = window.location.hash.replace('#', '');
            if (hash) {
                const idx = fragmentos.findIndex(f => slugify(f.ancla) === hash);
                if (idx >= 0) { showDetail(idx); return; }
            }
            showIndex();
        });

        function initFromHash() {
            const hash = window.location.hash.replace('#', '');
            if (hash) {
                const idx = fragmentos.findIndex(f => slugify(f.ancla) === hash);
                if (idx >= 0) showDetail(idx);
            }
        }

        renderIndex();
        initFromHash();

        const cursor = document.getElementById('cursor');
        document.addEventListener('mousemove', e => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top  = e.clientY + 'px';
        });
        document.querySelectorAll('a, button').forEach(el => {
            el.addEventListener('mouseenter', () => { cursor.style.transform = 'scale(1.4)'; });
            el.addEventListener('mouseleave', () => { cursor.style.transform = 'scale(1)'; });
        });
    </script>

</body>
</html>
